name: junior_hub
description: JuniorHub academic resource platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '^3.12.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  google_fonts: ^6.2.1
  flutter_appauth: ^7.0.0
  url_launcher: ^6.3.0
  shared_preferences: ^2.3.2
    # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  firebase_analytics: ^11.3.3

  # Google Sign-In (needed for desktop/mobile; web uses popup)
  google_sign_in: ^6.2.1



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/